    <style>
        :root {
            --bg-color: #f0f3f5;
            --card-bg: #ffffff;
            --primary-color: #e53935;
            --primary-hover: #c62828;
            --selected-color: #2e7d32; 
            --suggested-al-color: #0288d1;
            --suggested-al-hover: #01579b;
            --user-al-color: #3f51b5; 
            --user-al-hover: #1a237e;
            --export-btn-color: #43a047;
            --export-btn-hover: #2e7d32;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --weekend-bg: #f8f9fa;
            --weekend-text: #bdc3c7;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
            padding-bottom: calc(20px + var(--safe-bottom));
        }

        .dashboard {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .lang-control-panel {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-bottom: -10px;
        }

        .toggle-lang-btn {
            background-color: #e2e8f0;
            color: var(--text-main);
            border: none;
            padding: 6px 14px;
            font-weight: 600;
            font-size: 0.85rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            touch-action: manipulation;
            user-select: none;
        }

        .toggle-lang-btn.active {
            background-color: var(--text-main);
            color: #ffffff;
        }

        .toggle-lang-btn:active {
            transform: scale(0.92);
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 14px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            padding: 30px;
            box-sizing: border-box;
            transition: padding 0.3s ease;
        }

        .countdown-card {
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: 1.25rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin: 0 0 15px 0;
            transition: font-size 0.3s ease;
        }

        .countdown-wrapper {
            margin: 15px 0;
        }

        .number {
            font-size: 5.5rem;
            font-weight: 800;
            color: var(--primary-color);
            line-height: 1;
            transition: color 0.3s ease, font-size 0.3s ease;
        }

        .countdown-card.browsing .number {
            color: var(--selected-color);
        }

        .label {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        .nav-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 25px;
            gap: 15px;
            background: #fdfdfd;
            border: 1px solid #eaeaea;
            border-radius: 50px;
            padding: 8px 16px;
            transition: all 0.3s ease;
        }

        .nav-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.2s ease, opacity 0.2s ease, transform 0.15s ease;
            user-select: none;
            touch-action: manipulation;
            min-height: 44px;
            min-width: 44px;
        }

        .nav-btn:hover:not(:disabled) {
            background-color: var(--primary-hover);
        }

        .nav-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        .nav-btn:disabled {
            background-color: #e0e0e0;
            color: #a0a0a0;
            cursor: not-allowed;
            transform: none;
        }

        .holiday-details {
            flex-grow: 1;
        }

        .holiday-name {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-main);
            transition: font-size 0.3s ease;
        }

        .holiday-date {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Optimizer Styles */
        .optimizer-card h2 {
            font-size: 1.4rem;
            margin: 0 0 20px 0;
            color: var(--text-main);
            border-left: 4px solid var(--suggested-al-color);
            padding-left: 10px;
            transition: font-size 0.3s ease;
        }

        .optimizer-form {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }

        .optimizer-input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
            min-width: 140px;
        }

        .optimizer-input-group label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .optimizer-input {
            padding: 10px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            width: 140px;
            outline: none;
            transition: border-color 0.2s ease;
            -webkit-appearance: none;
            appearance: none;
        }

        .optimizer-input:focus {
            border-color: var(--suggested-al-color);
        }

        .optimizer-btn {
            background-color: var(--suggested-al-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.15s ease;
            margin-top: 22px;
            touch-action: manipulation;
            user-select: none;
            min-height: 48px;
        }

        .optimizer-btn:hover {
            background-color: var(--suggested-al-hover);
        }

        .optimizer-btn:active {
            transform: scale(0.97);
        }

        .clear-btn {
            background-color: #607d8b;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.15s ease;
            margin-top: 22px;
            touch-action: manipulation;
            user-select: none;
            min-height: 48px;
        }

        .clear-btn:hover {
            background-color: #455a64;
        }

        .clear-btn:active {
            transform: scale(0.97);
        }

        .export-btn {
            background-color: var(--export-btn-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.15s ease;
            margin-top: 22px;
            display: flex;
            align-items: center;
            gap: 8px;
            touch-action: manipulation;
            user-select: none;
            min-height: 48px;
        }

        .export-btn:hover {
            background-color: var(--export-btn-hover);
        }

        .export-btn:active {
            transform: scale(0.97);
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            flex: 1;
            min-width: 200px;
        }

        .button-group .optimizer-btn,
        .button-group .clear-btn,
        .button-group .export-btn {
            flex: 1;
            min-width: 100px;
            margin-top: 22px;
            justify-content: center;
        }

        .optimizer-summary {
            margin-top: 15px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #0277bd;
            background-color: #e1f5fe;
            padding: 12px 18px;
            border-radius: 8px;
            border-left: 4px solid var(--suggested-al-color);
            white-space: pre-line;
            display: none;
            word-break: break-word;
        }

        .calendar-card h2 {
            font-size: 1.4rem;
            margin: 0 0 20px 0;
            color: var(--text-main);
            border-left: 4px solid var(--primary-color);
            padding-left: 10px;
            transition: border-color 0.3s ease, font-size 0.3s ease;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .month-box {
            border: 1px solid #eef2f5;
            border-radius: 8px;
            padding: 12px;
            background: #fafbfc;
            transition: padding 0.3s ease;
        }

        .month-title {
            font-weight: 700;
            text-align: center;
            margin-bottom: 10px;
            font-size: 0.95rem;
            color: var(--text-main);
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            text-align: center;
            font-size: 0.8rem;
        }

        .day-name {
            font-weight: 700;
            color: var(--text-muted);
            padding-bottom: 5px;
            font-size: 0.75rem;
        }

        .day-cell {
            padding: 6px 0;
            border-radius: 6px;
            color: var(--text-main);
            font-weight: 500;
            position: relative;
            transition: all 0.2s ease;
            cursor: pointer;
            touch-action: manipulation;
            user-select: none;
            min-height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .day-cell:active {
            transform: scale(0.9);
        }

        .day-cell.weekend {
            background-color: var(--weekend-bg);
            color: var(--weekend-text);
            cursor: default;
        }

        .day-cell.weekend:active {
            transform: none;
        }

        .day-cell.holiday {
            background-color: var(--primary-color);
            color: #ffffff !important;
            font-weight: 700;
            cursor: pointer;
        }

        .day-cell.holiday:hover {
            background-color: var(--primary-hover);
        }

        .day-cell.holiday:active {
            transform: scale(0.92);
        }

        /* Suggested AL Color Styles */
        .day-cell.suggested-al {
            background-color: var(--suggested-al-color) !important;
            color: #ffffff !important;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 2px 4px rgba(2, 136, 209, 0.3);
        }

        .day-cell.suggested-al:hover {
            background-color: var(--suggested-al-hover) !important;
        }

        .day-cell.suggested-al:active {
            transform: scale(0.9);
        }

        /* User Preferred AL Color Styles */
        .day-cell.user-selected-al {
            background-color: var(--user-al-color) !important;
            color: #ffffff !important;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 2px 4px rgba(63, 81, 181, 0.3);
        }

        .day-cell.user-selected-al:hover {
            background-color: var(--user-al-hover) !important;
        }

        .day-cell.user-selected-al:active {
            transform: scale(0.9);
        }

        .day-cell.standard-workday {
            cursor: pointer;
        }

        .day-cell.standard-workday:active {
            transform: scale(0.9);
        }

        .day-cell.holiday.selected-holiday {
            background-color: var(--selected-color) !important;
            box-shadow: 0 2px 6px rgba(46, 125, 50, 0.4);
            transform: scale(1.1);
            z-index: 3;
        }

        .day-cell.today {
            box-shadow: inset 0 0 0 2px var(--text-main);
            font-weight: 700;
        }

        .day-cell.empty {
            visibility: hidden;
            cursor: default;
        }

        .day-cell.empty:active {
            transform: none;
        }

        .footer-banner {
            text-align: center;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-muted); 
            margin-top: 15px;
            min-height: 1.5em;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 500;
            z-index: 9999;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Touch-friendly tap targets */
        .nav-btn, .optimizer-btn, .clear-btn, .export-btn, .toggle-lang-btn, .day-cell {

            -webkit-tap-highlight-color: rgba(0,0,0,0.1);

            { date: '2027-06-09', en: 'Tuen Ng Festival', zh: '端午節', zinger: "" },
            { date: '2027-07-01', en: 'HKSAR Establishment Day', zh: '香港特別行政區成立紀念日', zinger: "" },
            { date: '2027-09-16', en: 'Day following Chinese Mid-Autumn Festival', zh: '中秋節翌日', zinger: "" },
            { date: '2027-10-01', en: 'National Day', zh: '國慶日', zinger: "" },
            { date: '2027-10-08', en: 'Chung Yeung Festival', zh: '重陽節', zinger: "" },
            { date: '2027-12-25', en: 'Christmas Day', zh: '聖誕節', zinger: "" },
            { date: '2027-12-27', en: 'The first weekday after Christmas Day', zh: '聖誕節後第一個周日', zinger: "" }
        ];

        let upcomingHolidays = [];
        let currentIndex = 0;
        let currentLang = 'zh'; 
        
        // Unified State Containers
        let suggestedALDates = new Set();
        let userSelectedALDates = new Set();

        // Toast function
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            clearTimeout(toast._hideTimeout);
            toast._hideTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        function parseDate(dateStr) {
            const parts = dateStr.split('-');
            return new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10), 0, 0, 0, 0);
        }

        function formatDateKey(dateObj) {
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function calculateWeekdays(startDate, endDate) {
            let count = 0;
            let current = new Date(startDate.getTime());
            current.setHours(0,0,0,0);
            
            let target = new Date(endDate.getTime());
            target.setHours(0,0,0,0);

            if (current > target) return 0;

            while (current < target) {
                current.setDate(current.getDate() + 1);
                const dayOfWeek = current.getDay();
                if (dayOfWeek !== 0 && dayOfWeek !== 6) {
                    count++;
                }
            }
            return count;
        }

        function setLanguage(lang) {
            if(currentLang === lang) return;
            currentLang = lang;
            
            document.getElementById('btn-lang-en').classList.toggle('active', lang === 'en');
            document.getElementById('btn-lang-zh').classList.toggle('active', lang === 'zh');
            
            renderCalendarOverview();
            updateSummaryMessage();
            updateDisplay();
        }

        function changeHoliday(step) {
            currentIndex += step;
            if (currentIndex < 0) currentIndex = 0;
            if (currentIndex >= upcomingHolidays.length) currentIndex = upcomingHolidays.length - 1;
            updateDisplay();
            
            // Scroll to top of countdown card on mobile
            if (window.innerWidth <= 600) {
                document.getElementById('main-countdown-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function selectHolidayByDate(dateStr) {
            const index = upcomingHolidays.findIndex(h => h.date === dateStr);
            if (index !== -1) {
                currentIndex = index;
                updateDisplay();
                const card = document.getElementById('main-countdown-card');
                card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function toggleALDate(dateStr) {
            if (userSelectedALDates.has(dateStr)) {
                userSelectedALDates.delete(dateStr);
                const langPack = localizedContent[currentLang];
                showToast(`🗑️ ${dateStr} removed`);
            } else if (suggestedALDates.has(dateStr)) {
                suggestedALDates.delete(dateStr);
                const langPack = localizedContent[currentLang];
                showToast(`🗑️ ${dateStr} removed`);
            } else {
                userSelectedALDates.add(dateStr);
                const langPack = localizedContent[currentLang];
                showToast(`✅ ${dateStr} added`);
            }
            
            renderCalendarOverview();
            updateSummaryMessage();
            updateDisplay();
        }

        function clearAllSelections() {
            userSelectedALDates.clear();
            suggestedALDates.clear();
            const summaryElement = document.getElementById('opt-summary-text');
            summaryElement.innerText = "";
            summaryElement.style.display = "none";
            renderCalendarOverview();
            updateDisplay();
            const langPack = localizedContent[currentLang];
            showToast("🧹 " + (currentLang === 'zh' ? '已清除所有選擇' : 'Cleared all selections'));
        }

        function updateSummaryMessage() {
            const summaryElement = document.getElementById('opt-summary-text');
            if (summaryElement.style.display !== "block") return; 

            const annualLimit = parseInt(document.getElementById('yearly-al-input').value, 10) || 0;
            
            let count2026 = 0;
            let count2027 = 0;
            let user2026 = 0;
            let user2027 = 0;

            userSelectedALDates.forEach(d => {
                if (d.startsWith('2026')) { count2026++; user2026++; }
                if (d.startsWith('2027')) { count2027++; user2027++; }
            });
            suggestedALDates.forEach(d => {
                if (d.startsWith('2026')) count2026++;
                if (d.startsWith('2027')) count2027++;
            });

            const langPack = localizedContent[currentLang];
            let summaryMessage = langPack.optSummary
                .replace("{count2026}", count2026)
                .replace("{count2027}", count2027);

            if (user2026 > annualLimit || user2027 > annualLimit) {
                summaryMessage += "\n\n" + langPack.overLimitWarning;
            }
            summaryElement.innerText = summaryMessage;
        }

        function runLeaveOptimization() {
            const annualLimit = parseInt(document.getElementById('yearly-al-input').value, 10);
            if (isNaN(annualLimit) || annualLimit < 0) return;

            suggestedALDates.clear();

            const phMap = {};
            hkHolidays.forEach(h => phMap[h.date] = true);

            let userCount2026 = 0;
            let userCount2027 = 0;
            userSelectedALDates.forEach(d => {
                if (d.startsWith('2026')) userCount2026++;
                if (d.startsWith('2027')) userCount2027++;
            });

            let budget2026 = Math.max(0, annualLimit - userCount2026);
            let budget2027 = Math.max(0, annualLimit - userCount2027);

            const timeline = [];
            let runner = new Date(2026, 0, 1);
            const endTimelineDate = new Date(2027, 11, 31);

            while (runner <= endTimelineDate) {
                const key = formatDateKey(runner);
                const dayOfWeek = runner.getDay();
                const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
                const isPH = !!phMap[key];
                const isUserSelected = userSelectedALDates.has(key);

                timeline.push({
                    dateKey: key,
                    year: runner.getFullYear(),
                    isPH: isPH,
                    isRestBoundary: isWeekend || isPH || isUserSelected,
                    isAvailableForSuggestion: !isWeekend && !isPH && !isUserSelected
                });
                runner.setDate(runner.getDate() + 1);
            }

            const candidates = [];
            let idx = 0;
            while (idx < timeline.length) {
                if (timeline[idx].isAvailableForSuggestion) {
                    let startIdx = idx;
                    while (idx < timeline.length && timeline[idx].isAvailableForSuggestion) {
                        idx++;
                    }
                    let endIdx = idx - 1;
                    let gapLength = (endIdx - startIdx) + 1;

                    let leftRestDays = 0;
                    let l = startIdx - 1;
                    while (l >= 0 && timeline[l].isRestBoundary) {
                        leftRestDays++;
                        l--;
                    }

                    let rightRestDays = 0;
                    let r = endIdx + 1;
                    while (r < timeline.length && timeline[r].isRestBoundary) {
                        rightRestDays++;
                        r++;
                    }

                    let totalBlockLength = leftRestDays + gapLength + rightRestDays;
                    let efficiency = totalBlockLength / gapLength;

                    candidates.push({
                        startIdx: startIdx,
                        endIdx: endIdx,
                        gapLength: gapLength,
                        totalBlockLength: totalBlockLength,
                        efficiency: efficiency
                    });
                } else {
                    idx++;
                }
            }

            candidates.sort((a, b) => {
                if (b.efficiency !== a.efficiency) return b.efficiency - a.efficiency;
                return b.totalBlockLength - a.totalBlockLength;
            });

            candidates.forEach(cand => {
                let need2026 = 0;
                let need2027 = 0;
                for (let i = cand.startIdx; i <= cand.endIdx; i++) {
                    if (timeline[i].year === 2026) need2026++;
                    if (timeline[i].year === 2027) need2027++;
                }

                if (budget2026 >= need2026 && budget2027 >= need2027) {
                    for (let i = cand.startIdx; i <= cand.endIdx; i++) {
                        suggestedALDates.add(timeline[i].dateKey);
                    }
                    budget2026 -= need2026;
                    budget2027 -= need2027;
                }
            });

            document.getElementById('opt-summary-text').style.display = "block";
            renderCalendarOverview();
            updateSummaryMessage();
            updateDisplay();
            
            const langPack = localizedContent[currentLang];
            showToast("✅ " + (currentLang === 'zh' ? '優化完成！' : 'Optimization complete!'));
        }

        function exportToICS() {
            const langPack = localizedContent[currentLang];
            const combinedLeaveDates = new Set([...userSelectedALDates, ...suggestedALDates]);
            
            if (combinedLeaveDates.size === 0) {
                showToast("⚠️ " + langPack.noLeaveToExport);
                return;
            }

            let icsContent = [
                "BEGIN:VCALENDAR",
                "VERSION:2.0",
                "PRODID:-//Chi Kit Matthew Choy//HK Holiday Planner//EN",
                "CALSCALE:GREGORIAN",
                "METHOD:PUBLISH"
            ];

            let fallbackYear = new Date().getFullYear();

            combinedLeaveDates.forEach(dateStr => {
                const baseDate = parseDate(dateStr);
                fallbackYear = baseDate.getFullYear();
                
                const startY = baseDate.getFullYear();
                const startM = String(baseDate.getMonth() + 1).padStart(2, '0');
                const startD = String(baseDate.getDate()).padStart(2, '0');
                const dtStart = `${startY}${startM}${startD}`;
                
                const nextDate = new Date(baseDate.getTime());
                nextDate.setDate(nextDate.getDate() + 1);
                const endY = nextDate.getFullYear();
                const endM = String(nextDate.getMonth() + 1).padStart(2, '0');
                const endD = String(nextDate.getDate()).padStart(2, '0');
                const dtEnd = `${endY}${endM}${endD}`;
                
                const timestamp = new Date().toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
                const uniqueId = `leave-${dateStr}-${Math.random().toString(36).substr(2, 9)}@hkholidayplanner.com`;

                icsContent.push(
                    "BEGIN:VEVENT",
                    `UID:${uniqueId}`,
                    `DTSTAMP:${timestamp}`,
                    `DTSTART;VALUE=DATE:${dtStart}`,
                    `DTEND;VALUE=DATE:${dtEnd}`,
                    `SUMMARY:${langPack.icsEventSummary}`,
                    "STATUS:CONFIRMED",
                    "TRANSP:TRANSPARENT",
                    "END:VEVENT"
                );
            });

            icsContent.push("END:VCALENDAR");
            const icsString = icsContent.join("\r\n");
            
            const blob = new Blob([icsString], { type: "text/calendar;charset=utf-8" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `HK_Leave_Planner_${fallbackYear}.ics`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            showToast("📅 " + langPack.toastExported);
        }

        function updateDisplay() {
            const langPack = localizedContent[currentLang];
            
            document.getElementById('days-label').innerText = langPack.daysLabel;
            document.getElementById('prev-btn').innerText = langPack.backBtn;
            document.getElementById('next-btn').innerText = langPack.nextBtn;
            document.getElementById('calendar-title').innerText = langPack.calendarTitle;
            
            document.getElementById('opt-title').innerText = langPack.optTitle;
            document.getElementById('opt-input-label').innerText = langPack.optInputLabel;
            document.getElementById('opt-submit-btn').innerText = langPack.optBtn;
            document.getElementById('opt-clear-btn').innerText = langPack.optClearBtn;
            document.getElementById('opt-export-btn').innerText = langPack.optExportBtn;

            if (upcomingHolidays.length === 0) {
                document.getElementById('days-left').innerText = "0";
                document.getElementById('holiday-name').innerText = langPack.noHolidays;
                document.getElementById('holiday-date').innerText = langPack.checkDevice;
                document.getElementById('dynamic-footer-banner').innerText = "";
                document.getElementById('prev-btn').disabled = true;
                document.getElementById('next-btn').disabled = true;
                return;
            }

            const currentHoliday = upcomingHolidays[currentIndex];
            const today = new Date();
            today.setHours(0,0,0,0);

            const targetDateObj = parseDate(currentHoliday.date);
            const weekdaysRemaining = calculateWeekdays(today, targetDateObj);
            
            document.getElementById('days-left').innerText = weekdaysRemaining;
            document.getElementById('holiday-name').innerText = currentHoliday[currentLang];
            
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('holiday-date').innerText = targetDateObj.toLocaleDateString(langPack.localeStr, options);

            document.getElementById('prev-btn').disabled = (currentIndex === 0);
            document.getElementById('next-btn').disabled = (currentIndex === upcomingHolidays.length - 1);
            
            const firstFutureIndex = upcomingHolidays.findIndex(item => parseDate(item.date) >= today);
            const isNearest = (currentIndex === firstFutureIndex || (firstFutureIndex === -1 && currentIndex === 0));

            const headerPrefix = isNearest ? langPack.nearestLabel : langPack.upcomingLabel;
            document.getElementById('deck-title').innerText = isNearest 
                ? headerPrefix 
                : `${headerPrefix} (${currentIndex + 1}/${upcomingHolidays.length})`;

            const mainCard = document.getElementById('main-countdown-card');
            
            const bannerElement = document.getElementById('dynamic-footer-banner');
            if (currentLang === 'zh') {
                bannerElement.innerText = currentHoliday.zinger; 
            } else {
                bannerElement.innerText = "";
            }

            document.querySelectorAll('.day-cell.selected-holiday').forEach(cell => {
                cell.classList.remove('selected-holiday');
            });

            if (isNearest) {
                mainCard.classList.remove('browsing'); 
            } else {
                mainCard.classList.add('browsing'); 
            }

            const activeCalendarCell = document.querySelector(`.day-cell[data-date="${currentHoliday.date}"]`);
            if (activeCalendarCell) {
                activeCalendarCell.classList.add('selected-holiday');
            }
        }

        function renderCalendarOverview() {
            const overviewContainer = document.getElementById('calendar-overview');
            overviewContainer.innerHTML = ""; 
            
            const langPack = localizedContent[currentLang];
            const today = new Date();
            const startYear = today.getFullYear();
            const startMonth = today.getMonth();
            
            const endYear = startYear + 1;
            const endMonth = 11; 
            const totalMonthsToRender = ((endYear - startYear) * 12) + (endMonth - startMonth) + 1;

            const holidayMap = {};
            hkHolidays.forEach(h => holidayMap[h.date] = h[currentLang]);

            for (let i = 0; i < totalMonthsToRender; i++) {
                let currentMonthIndex = startMonth + i;
                let targetYear = startYear;

                if (currentMonthIndex > 11) {
                    targetYear += Math.floor(currentMonthIndex / 12);
                    currentMonthIndex = currentMonthIndex % 12;
                }

                const monthBox = document.createElement('div');
                monthBox.className = 'month-box';

                const monthLabel = new Date(targetYear, currentMonthIndex).toLocaleString(langPack.localeStr, { month: 'long', year: 'numeric' });
                const title = document.createElement('div');
                title.className = 'month-title';
                title.innerText = monthLabel;
                monthBox.appendChild(title);

                const daysGrid = document.createElement('div');
                daysGrid.className = 'days-grid';

                langPack.weekdaysHeader.forEach(dayName => {
                    const headerCell = document.createElement('div');
                    headerCell.className = 'day-name';
                    headerCell.innerText = dayName;
                    daysGrid.appendChild(headerCell);
                });

                const firstDayDayOfWeek = new Date(targetYear, currentMonthIndex, 1).getDay();
                const totalDaysInMonth = new Date(targetYear, currentMonthIndex + 1, 0).getDate();

                for (let space = 0; space < firstDayDayOfWeek; space++) {
                    const blankCell = document.createElement('div');
                    blankCell.className = 'day-cell empty';
                    daysGrid.appendChild(blankCell);
                }

                for (let date = 1; date <= totalDaysInMonth; date++) {
                    const dayCell = document.createElement('div');
                    dayCell.className = 'day-cell';
                    dayCell.innerText = date;

                    const dateStringKey = `${targetYear}-${String(currentMonthIndex + 1).padStart(2, '0')}-${String(date).padStart(2, '0')}`;
                    const targetDayOfWeek = new Date(targetYear, currentMonthIndex, date).getDay();

                    dayCell.setAttribute('data-date', dateStringKey);

                    if (targetDayOfWeek === 0 || targetDayOfWeek === 6) {
                        dayCell.classList.add('weekend');
                    } else if (holidayMap[dateStringKey]) {
                        dayCell.classList.add('holiday');
                        dayCell.title = holidayMap[dateStringKey];
                        dayCell.onclick = function() {
                            selectHolidayByDate(dateStringKey);
                        };
                    } else {
                        dayCell.classList.add('standard-workday');
                        dayCell.onclick = function() {
                            toggleALDate(dateStringKey);
                        };
                    }

                    if (userSelectedALDates.has(dateStringKey)) {
                        dayCell.classList.add('user-selected-al');
                    } else if (suggestedALDates.has(dateStringKey)) {
                        dayCell.classList.add('suggested-al');
                    }

                    if (targetYear === today.getFullYear() && currentMonthIndex === today.getMonth() && date === today.getDate()) {
                        dayCell.classList.add('today');
                    }

                    daysGrid.appendChild(dayCell);
                }

                monthBox.appendChild(daysGrid);
                overviewContainer.appendChild(monthBox);
            }
        }

        const todayInstance = new Date();
        todayInstance.setHours(0,0,0,0);

        const startOfThisMonth = new Date(todayInstance.getFullYear(), todayInstance.getMonth(), 1);
        upcomingHolidays = hkHolidays.filter(item => {
            const hDate = parseDate(item.date);
            return hDate >= startOfThisMonth;
        });

        const initialIndex = upcomingHolidays.findIndex(item => parseDate(item.date) >= todayInstance);
        currentIndex = initialIndex !== -1 ? initialIndex : 0;

        renderCalendarOverview();
        updateDisplay();
    </script>
</body>
</html>
